services:
  postgres:
    image: postgres:17-alpine
    container_name: inmob_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-inmob}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-inmob_pass}
      POSTGRES_DB: ${POSTGRES_DB:-inmob_platform}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inmob} -d ${POSTGRES_DB:-inmob_platform}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: inmob_redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: inmob_api
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      PORT: 3001
      PLATFORM_DATABASE_URL: postgresql://${POSTGRES_USER:-inmob}:${POSTGRES_PASSWORD:-inmob_pass}@postgres:5432/${POSTGRES_DB:-inmob_platform}
      POSTGRES_ADMIN_URL: postgresql://${POSTGRES_USER:-inmob}:${POSTGRES_PASSWORD:-inmob_pass}@postgres:5432
    expose:
      - "3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: inmob_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
      - frontend_dist:/var/www/app:ro
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-tudominio.com}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  letsencrypt:
  certbot_webroot:
  frontend_dist:
