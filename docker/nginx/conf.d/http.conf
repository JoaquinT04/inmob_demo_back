# HTTP — siempre activo
# Sirve certbot challenge y redirige a HTTPS
server {
    listen 80;
    server_name _;

    # Let's Encrypt HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
